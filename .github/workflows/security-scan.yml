# Dependency and CVE checks (pip-audit / npm audit). This is separate from Dependabot, which only
# validates .github/dependabot.yml and opens update PRs on a schedule.
name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip "pip-audit>=2.7,<3"
      - name: pip-audit (requirements.txt)
        run: pip-audit -r requirements.txt --desc on

  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (npm ci)
        run: npm ci
      - name: npm audit (high or critical)
        run: npm audit --audit-level=high
