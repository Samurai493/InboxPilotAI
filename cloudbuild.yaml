# Cloud Build expects a Dockerfile at the workspace root by default.
# This repo keeps the API Dockerfile in backend/ — run docker from there.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/inboxpilot-backend:$BUILD_ID'
      - .
    dir: backend

images:
  - 'gcr.io/$PROJECT_ID/inboxpilot-backend:$BUILD_ID'
